<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appraisals — Jonathan's Jewelry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --copper: #B46A3C;
      --navy:   #1B2A4A;
      --cream:  #FAF7F2;
      --text:   #2C2C2C;
    }

    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); }

    header {
      background: var(--navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.55rem;
      letter-spacing: .08em;
      color: #fff;
      text-decoration: none;
    }

    .logo span { color: var(--copper); }

    nav { display: flex; gap: 2rem; align-items: center; }

    nav a {
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
      text-decoration: none;
      transition: color .2s;
    }

    nav a:hover, nav a.active { color: var(--copper); }

    nav .coming-soon { color: rgba(255,255,255,.4); cursor: default; position: relative; }

    nav .coming-soon::after {
      content: 'soon';
      position: absolute;
      top: -8px; right: -2px;
      font-size: .55rem;
      letter-spacing: .05em;
      color: var(--copper);
      font-style: italic;
    }

    /* ── PAGE HERO ───────────────────────────────── */
    .page-hero {
      background: linear-gradient(160deg, var(--navy) 0%, #2a3f6a 100%);
      color: #fff;
      text-align: center;
      padding: 5rem 2rem 4rem;
    }

    .page-hero .eyebrow {
      font-size: .72rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--copper);
      margin-bottom: 1rem;
    }

    .page-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 1.15;
    }

    /* ── CONTENT PLACEHOLDER ─────────────────────── */
    .placeholder {
      max-width: 700px;
      margin: 5rem auto;
      padding: 3rem 2rem;
      text-align: center;
      border: 2px dashed rgba(180,106,60,.35);
      border-radius: 6px;
      background: rgba(180,106,60,.04);
    }

    .placeholder h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--navy);
      margin-bottom: .8rem;
    }

    .placeholder p {
      font-size: .9rem;
      color: #888;
      line-height: 1.7;
    }

    .placeholder code {
      display: inline-block;
      margin-top: .8rem;
      font-family: monospace;
      font-size: .78rem;
      color: var(--copper);
      background: rgba(180,106,60,.08);
      padding: .25rem .6rem;
      border-radius: 3px;
    }

    footer {
      background: #111;
      color: rgba(255,255,255,.4);
      text-align: center;
      padding: 2rem;
      font-size: .78rem;
      letter-spacing: .05em;
      margin-top: 5rem;
    }

    footer a { color: var(--copper); text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 0 1.2rem; }
      .logo { font-size: 1.2rem; }
      nav { gap: 1.2rem; }
      nav a { font-size: .7rem; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">Jonathan<span>'s</span> Jewelry</a>
    <nav>
      <a href="appraisals.html" class="active">Appraisals</a>
      <a class="coming-soon" aria-disabled="true">Financing</a>
    </nav>
  </header>

  <section class="page-hero">
    <p class="eyebrow">Our Services</p>
    <h1>Jewelry Appraisals</h1>
  </section>

  <!-- Replace the block below with the real appraisals content -->
  <div class="placeholder">
    <h2>Content Coming</h2>
    <p>Paste the content of <strong>jonathans-appraisals.html</strong> here to replace this placeholder.</p>
    <code>appraisals.html</code>
  </div>

  <footer>
    <p>&copy; 2026 Jonathan's Jewelry &nbsp;·&nbsp; <a href="index.html">Home</a></p>
  </footer>

</body>
</html>
